<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Now Playing SVG Editor</title>
    <link rel="stylesheet" href="/assets/editor.css" />
  </head>
  <body>
    <div class="layout">
      <div class="header">
        <h1>Now Playing</h1>
        <span class="sep">/</span>
        <span class="subtitle">SVG Editor</span>
      </div>

      <div class="sidebar">
        <details class="controls" open>
          <summary>Controls</summary>
          <div class="controls-body">
            <div class="control-group">
              <label>Playback State</label>
              <select id="statusSelect">
                <option value="playing">Playing</option>
                <option value="last-played">Last Played</option>
                <option value="empty">Nothing Playing</option>
              </select>
            </div>

            <div class="control-group">
              <label>Visualisation</label>
              <select id="visSelect">
                <option value="waveform">Waveform</option>
                <option value="equalizer">Equalizer</option>
                <option value="orbs">Orbs</option>
                <option value="particles">Particles</option>
              </select>
            </div>

            <div class="control-group">
              <label>Visibility</label>
              <div class="checkbox-group">
                <label class="checkbox-label">
                  <input type="checkbox" id="showStatus" />
                  Status
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="showTitle" />
                  Title
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="showArtist" />
                  Artist
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="showAlbum" />
                  Album
                </label>
              </div>
            </div>

            <div class="control-group">
              <label>Layout</label>
              <div class="control-row">
                <select id="albumPosition">
                  <option value="left">Album Left</option>
                  <option value="right">Album Right</option>
                </select>
                <select id="textAlign">
                  <option value="left">Align Left</option>
                  <option value="center">Align Center</option>
                  <option value="right">Align Right</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label>Card Colors</label>
              <span class="color-hint"
              >Optional. Overrides dynamic album art colors.</span>
              <div class="color-row inactive" id="cardBgRow">
                <input
                  type="color"
                  id="cardBgColor"
                  class="color-swatch"
                  value="#18181b"
                />
                <span class="color-label">Background</span>
                <span class="color-value" id="cardBgValue">auto</span>
                <button class="color-clear hidden" id="cardBgClear">x</button>
              </div>
              <div class="color-row inactive" id="cardBorderRow">
                <input
                  type="color"
                  id="cardBorderColor"
                  class="color-swatch"
                  value="#27272a"
                />
                <span class="color-label">Border</span>
                <span class="color-value" id="cardBorderValue">auto</span>
                <button class="color-clear hidden" id="cardBorderClear">
                  x
                </button>
              </div>
            </div>

            <div class="control-group">
              <label>Album Art</label>
              <button class="upload-btn" id="uploadBtn">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="17 8 12 3 7 8" />
                  <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                Upload Image
              </button>
              <span class="color-hint">Max 5 MB</span>
              <input
                type="file"
                id="artFileInput"
                class="hidden-input"
                accept="image/*"
              />
            </div>
          </div>
        </details>

        <div class="json-section">
          <div class="tab-bar">
            <button class="tab-btn active" id="tabTheme">Theme</button>
            <button class="tab-btn" id="tabData">Data</button>
          </div>
          <div class="json-header">
            <span class="json-error" id="jsonError"></span>
          </div>
          <textarea
            class="json-editor"
            id="themeEditor"
            spellcheck="false"
          ></textarea>
          <textarea
            class="json-editor hidden"
            id="dataEditor"
            spellcheck="false"
          ></textarea>
        </div>

        <div class="footer-bar">
          <div class="footer-left">
            <button class="footer-btn danger" id="resetBtn">Reset</button>
            <button class="footer-btn" id="exportBtn">Export Theme</button>
          </div>
          <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Ready</span>
          </div>
        </div>
      </div>

      <div class="preview-pane">
        <div class="preview-container">
          <div class="svg-wrapper" id="svgPreview"></div>
        </div>
      </div>
    </div>

    <script src="/assets/editor.js" nonce="{{CSP_NONCE}}"></script>
  </body>
</html>
